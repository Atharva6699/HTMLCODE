<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Web Page</title>

    <style>

    .form-container {
        width: 70%;
        margin: 40px auto;
        border: 2px solid black;
        padding: 20px;
    }

    .row {
        display: flex;
        gap: 30px;
        align-items: center;
        margin-bottom: 15px;
    }

    .row div {
        display: flex;
        flex-direction: column;
    }

    .row select, 
    .row input[type="text"] {
        padding: 6px;
        width: 200px;
    }

    .profile {
        text-align: right;
    }

    .profile img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
    }

    /* ✅ Gender in One Row */
    .gender-options {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: nowrap;   /* Prevent line break */
}


    </style>
</head>

<body>

<!-- Header Table -->
<table width="100%" border="1">
    <tr>
        <td align="left">
            <img src="https://upload.wikimedia.org/wikipedia/en/f/f6/Savitribai_Phule_Pune_University_Logo.png"
                 width="150" height="150">
        </td>
        <td align="center">
            <h1>Sinhgad Institute of Technology and Science</h1>
        </td>
        <td align="right">
            <img src="https://upload.wikimedia.org/wikipedia/en/f/f6/Savitribai_Phule_Pune_University_Logo.png"
                 width="150" height="150">
        </td>
    </tr>
</table>

<!-- Form Section -->
<section class="form-container">

    <h2 style="text-align:center;">Registration Form</h2>

    <div class="profile">
        <img src="https://i.gadgets360cdn.com/large/pavel_durov_twitter_1574430579140.jpg">
    </div>

    <form action="submit_form.php" method="post">

        <!-- First Name -->
        <div class="row">
            <div>
                <label><b>First Name:</b></label>
                <input type="text" name="first_name" required>
            </div>
        </div>

        <!-- Last Name -->
        <div class="row">
            <div>
                <label><b>Last Name:</b></label>
                <input type="text" name="last_name" required>
            </div>
        </div>

        <!-- Branch & Division -->
        <div class="row">
            <div>
                <label><b>Branch:</b></label>
                <select name="branch" required>
                    <option value="">Select Branch</option>
                    <option>CE</option>
                    <option>IT</option>
                    <option>E&TC</option>
                    <option>MECH</option>
                    <option>CIVIL</option>
                </select>
            </div>

            <div>
                <label><b>Division:</b></label>
                <select name="division" required>
                    <option value="">Select Division</option>
                    <option>A</option>
                    <option>B</option>
                </select>
            </div>
        </div>

        <!-- ✅ Gender & Blood Group in One Row -->
        <div class="row">

    <!-- Gender -->
    <div>
        <label><b>Gender:</b></label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <!-- Blood Group -->
    <div>
        <label><b>Blood Group:</b></label>
        <select name="blood_group" required>
            <option value="">Select</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>
    </div>

</div>

<!-- Contact Details -->
<h3>Contact Details</h3>

<div class="row">
    <div>
        <label><b>Mobile Number:</b></label>
        <input type="tel" name="mobile" pattern="[0-9]{10}" placeholder="Enter 10 digit number" required>
    </div>

    <div>
        <label><b>Email:</b></label>
        <input type="email" name="email" required>
    </div>
</div>

<div class="row">
    <div style="width:100%;">
        <label><b>Address:</b></label>
        <textarea name="address" rows="3" style="width:100%; padding:6px;" required></textarea>
    </div>
</div>

<div class="row">
    <div>
        <label><b>City:</b></label>
        <input type="text" name="city" required>
    </div>

    <div>
        <label><b>PIN Code:</b></label>
        <input type="text" name="pincode" pattern="[0-9]{6}" required>
    </div>
</div>
<!-- Social Media Links -->
<h3>Social Media Links</h3>

<div class="row">
    <div>
        <label><b>GitHub:</b></label>
        <input type="url" name="github" placeholder="https://github.com/username">
    </div>
</div>

<div class="row">
    <div>
        <label><b>Twitter (X):</b></label>
        <input type="url" name="twitter" placeholder="https://twitter.com/username">
    </div>
</div>

<div class="row">
    <div>
        <label><b>Facebook:</b></label>
        <input type="url" name="facebook" placeholder="https://facebook.com/username">
    </div>
</div>

<div class="row">
    <div>
        <label><b>Instagram:</b></label>
        <input type="url" name="instagram" placeholder="https://instagram.com/username">
    </div>
</div>

<!-- Describe Yourself -->
<h3>Describe Yourself</h3>

<div class="row">
    <div style="width:100%;">
        <label><b>About You:</b></label>
        <textarea name="about" rows="4" 
                  placeholder="Write something about yourself..."
                  style="width:100%; padding:8px;" required>
        </textarea>
    </div>
</div>




        </div>

        <input type="submit" value="Submit" style="padding:8px 20px;">

    </form>

</section>

</body>
</html>
